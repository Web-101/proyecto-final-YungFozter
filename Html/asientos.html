<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selección de Asientos — CineWeb</title>
    <meta name="description" content="Selecciona tus asientos para disfrutar tu película favorita en CineWeb." />
    <link rel="stylesheet" href="../Css/asientos.css" />
</head>

<body>

    <header class="header">
        <a href="#" id="btn-back" class="btn-back" title="Volver">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </a>
        <div class="header-info">
            <div class="header-titulo" id="header-titulo">Cargando...</div>
            <div class="header-subtitulo" id="header-subtitulo"></div>
        </div>
        <a href="../Html/DashboardScreen.html" class="logo-text">CINEWEB</a>
    </header>

    <main class="main">

        <div class="estado-carga" id="estado-carga">
            <div class="spinner"></div>
            <span>Cargando sala...</span>
        </div>

        <div class="estado-error" id="estado-error" style="display:none;">
            <div class="icono-error">⚠️</div>
            <p id="mensaje-error">No se pudo cargar la sala. Verifica que el servidor esté activo.</p>
            <button class="btn-reintentar" id="btn-reintentar">Reintentar</button>
        </div>

        <div id="sala-contenedor" style="display:none;">

            <div class="screen-wrapper">
                <div class="screen"></div>
                <span class="screen-label">pantalla</span>
            </div>

            <div class="sala-wrapper">
                <div class="sala-grid" id="sala-grid">
                </div>
                <div class="col-labels" id="col-labels">
                </div>
            </div>

            <div class="leyenda">
                <div class="leyenda-item">
                    <div class="leyenda-box disponible"></div>
                    <span>Disponible</span>
                </div>
                <div class="leyenda-item">
                    <div class="leyenda-box seleccionado"></div>
                    <span>Seleccionado</span>
                </div>
                <div class="leyenda-item">
                    <div class="leyenda-box ocupado"></div>
                    <span>Ocupado</span>
                </div>
            </div>

        </div>
    </main>
    <div class="panel-resumen" id="panel-resumen">
        <div class="resumen-info">
            <div class="resumen-asientos">
                <div class="resumen-label">Asientos</div>
                <div class="resumen-valor placeholder" id="resumen-asientos-texto">
                    Ninguno seleccionado
                </div>
            </div>
            <div class="resumen-total">
                <div class="resumen-label">Total</div>
                <div class="total-precio" id="resumen-total">$0.00</div>
                <div class="total-por-entrada" id="resumen-por-entrada"></div>
            </div>
        </div>
        <button class="btn-continuar" id="btn-continuar" disabled>
            <span>Continuar</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        </button>
    </div>

    <script src="../javascript/asientos.js"></script>

</body>

</html>
