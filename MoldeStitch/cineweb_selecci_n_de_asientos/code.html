<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Selección de Asientos - CineWeb</title>
<!-- Load Tailwind CSS v3 with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Font Awesome for the film icon -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
<style data-purpose="base-layout">
    body {
      font-family: 'Inter', Arial, sans-serif;
      background: #000000;
      color: #ffffff;
      margin: 0;
      min-height: 100vh;
    }
    /* Custom scrollbar for better look on mobile */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-thumb {
      background: #3a3a3a;
      border-radius: 10px;
    }
  </style>
<style data-purpose="cinema-elements">
    /* Screen styling with gradient */
    .pantalla {
      background: linear-gradient(to bottom, #FEE715, transparent);
      width: 90%;
      height: 40px;
      margin: 0 auto 30px auto;
      border-radius: 50% 50% 0 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 8px;
      font-weight: bold;
      letter-spacing: 3px;
      color: #000;
      font-size: 10px;
    }

    @media (min-width: 768px) {
      .pantalla {
        height: 60px;
        font-size: 12px;
      }
    }

    /* Seat specific styling to match the document's design */
    .asiento, .asiento-demo {
      position: relative;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    /* Top part of the seat (backrest) */
    .asiento::before, .asiento-demo::before {
      content: '';
      position: absolute;
      width: 50%;
      height: 50%;
      background: inherit;
      border-radius: 50%;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
    }

    .asiento.disponible { background: #3a3a3a; }
    .asiento.disponible:hover { background: #4a4a4a; transform: scale(1.1); }
    .asiento.ocupado { background: #666; cursor: not-allowed; }
    .asiento.seleccionado { background: #FEE715; }

    .asiento-demo.disponible { background: #3a3a3a; }
    .asiento-demo.ocupado { background: #666; }
    .asiento-demo.seleccionado { background: #FEE715; cursor: default; }
  </style>
</head>
<body class="pb-10">
<!-- BEGIN: Navigation -->
<nav class="flex items-center justify-between p-4 border-b border-[#212121] bg-black sticky top-0 z-50">
<div class="flex items-center gap-2" data-purpose="logo-container">
<i class="fa-solid fa-film text-[#FEE715] text-xl"></i>
<span class="text-[#FEE715] font-bold text-lg tracking-wider">CineWeb</span>
</div>
<button class="bg-[#FEE715] text-[#101820] font-bold py-2 px-5 rounded-full text-sm hover:bg-[#fff700] transition-colors" onclick="history.back()">
      Volver
    </button>
</nav>
<!-- END: Navigation -->
<main class="max-w-xl mx-auto px-4 mt-6">
<!-- BEGIN: Movie Info -->
<section class="text-center mb-8" data-purpose="movie-header">
<h1 class="text-2xl font-black mb-1" id="titulo-pelicula">DUNE: PARTE DOS</h1>
<p class="text-[#b7bcc2] text-sm mb-4" id="horario-funcion">3 Noviembre | 20:30 Sala 4 DX</p>
<p class="text-[#FEE715] font-semibold text-sm">Selecciona tus asientos:</p>
</section>
<!-- END: Movie Info -->
<!-- BEGIN: Cinema Hall -->
<section class="mb-10" data-purpose="seating-area">
<div class="pantalla">PANTALLA</div>
<div class="grid grid-cols-[auto_repeat(8,1fr)_auto] gap-2 items-center" id="grid-asientos">
<!-- Rows will be generated by script, adding sample rows for visual structure -->
</div>
</section>
<!-- END: Cinema Hall -->
<!-- BEGIN: Legend -->
<section class="flex justify-center gap-5 mb-8" data-purpose="legend">
<div class="flex items-center gap-2 text-[#b7bcc2] text-xs">
<span class="asiento-demo disponible w-5 h-5 rounded-md inline-block"></span>
<span>Disponible</span>
</div>
<div class="flex items-center gap-2 text-[#b7bcc2] text-xs">
<span class="asiento-demo ocupado w-5 h-5 rounded-md inline-block"></span>
<span>Ocupado</span>
</div>
<div class="flex items-center gap-2 text-[#b7bcc2] text-xs">
<span class="asiento-demo seleccionado w-5 h-5 rounded-md inline-block"></span>
<span>Seleccionado</span>
</div>
</section>
<!-- END: Legend -->
<!-- BEGIN: Selection Summary -->
<section class="bg-[#161c24] rounded-3xl p-6 flex flex-col gap-5 items-center" data-purpose="booking-summary">
<div class="w-full text-left" data-purpose="booking-details">
<h3 class="text-[#FEE715] text-lg font-bold mb-2">Resumen:</h3>
<p class="text-[#b7bcc2] text-sm my-1">Asientos: <span class="text-white" id="asientos-seleccionados">-</span></p>
<p class="text-white font-bold text-base">Precio Total: <span class="text-[#FEE715] text-2xl ml-1" id="precio-total">$0.00</span></p>
</div>
<button class="bg-[#FEE715] text-black font-bold w-full py-3 rounded-full text-base hover:scale-[1.02] active:scale-95 transition-all disabled:bg-[#3a3a3a] disabled:text-[#666] disabled:cursor-not-allowed" disabled="" id="boton-continuar">
        Siguiente
      </button>
</section>
<!-- END: Selection Summary -->
</main>
<script data-purpose="seating-logic">
    const gridAsientos = document.getElementById('grid-asientos');
    const asientosSpan = document.getElementById('asientos-seleccionados');
    const precioSpan = document.getElementById('precio-total');
    const botonContinuar = document.getElementById('boton-continuar');
    
    const rows = ['A', 'B', 'C', 'D', 'E', 'F'];
    const cols = 8;
    const precioPorAsiento = 12.50;
    let seleccionados = [];

    // Initialize Grid
    function initGrid() {
      gridAsientos.innerHTML = '';
      
      rows.forEach(rowLabel => {
        // Left Label
        const labelLeft = document.createElement('div');
        labelLeft.className = 'text-[#666] text-[10px] font-bold text-center';
        labelLeft.textContent = rowLabel;
        gridAsientos.appendChild(labelLeft);

        // Seats
        for (let i = 1; i <= cols; i++) {
          const seatId = `${rowLabel}${i}`;
          const seat = document.createElement('div');
          
          // Randomly assign some occupied seats
          const isOccupied = Math.random() < 0.2;
          
          seat.className = `asiento w-7 h-7 sm:w-9 sm:h-9 rounded-md ${isOccupied ? 'ocupado' : 'disponible'}`;
          seat.dataset.id = seatId;
          
          if (!isOccupied) {
            seat.addEventListener('click', () => toggleSeat(seat, seatId));
          }
          
          gridAsientos.appendChild(seat);
        }

        // Right Label
        const labelRight = document.createElement('div');
        labelRight.className = 'text-[#666] text-[10px] font-bold text-center';
        labelRight.textContent = rowLabel;
        gridAsientos.appendChild(labelRight);
      });
    }

    function toggleSeat(element, id) {
      if (element.classList.contains('seleccionado')) {
        element.classList.remove('seleccionado');
        element.classList.add('disponible');
        seleccionados = seleccionados.filter(item => item !== id);
      } else {
        element.classList.remove('disponible');
        element.classList.add('seleccionado');
        seleccionados.push(id);
      }
      updateSummary();
    }

    function updateSummary() {
      asientosSpan.textContent = seleccionados.length > 0 ? seleccionados.sort().join(', ') : '-';
      const total = (seleccionados.length * precioPorAsiento).toFixed(2);
      precioSpan.textContent = `$${total}`;
      
      botonContinuar.disabled = seleccionados.length === 0;
    }

    // Run on load
    initGrid();
  </script>
</body></html>
